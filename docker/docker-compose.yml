services:
  # --- MINIO OBJECT STORAGE ---
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: lakehouse-minio
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web Console Port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 2s

  # --- MINIO INITIALIZATION CONTAINER ---
  minio-init:
    image: minio/mc:RELEASE.2024-01-28T22-40-05Z
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 admin supersecretpassword; do 
        echo 'Waiting for MinIO S3 API...'; 
        sleep 1; 
      done;
      /usr/bin/mc mb -p myminio/landing-zone;
      /usr/bin/mc mb -p myminio/warehouse;
      echo 'MinIO Buckets initialized successfully!';
      exit 0;
      "
    networks:
      - lakehouse-net

  # --- APACHE ICEBERG REST CATALOG ---
  iceberg-catalog:
    image: tabular/iceberg-rest:0.6.0
    container_name: lakehouse-catalog
    ports:
      - "8181:8181" # REST API Port
    environment:
      - CATALOG_WAREHOUSE=s3a://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_ACCESS_KEY_ID=admin
      - CATALOG_S3_SECRET_ACCESS_KEY=supersecretpassword
      - CATALOG_S3_PATH_STYLE_ACCESS=true
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/127.0.0.1/8181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 2s

  # --- APACHE SPARK COMPUTE ---
  spark-master:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-spark-master
    ports:
      - "8888:8888" # Jupyter Interface
      - "8080:8080" # Spark Master UI
    volumes:
      - ../src:/home/jovyan/src
    environment:
      - SPARK_OPTS=--packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.hadoop:hadoop-aws:3.3.4,software.amazon.awssdk:bundle:2.20.18,software.amazon.awssdk:url-connection-client:2.20.18 --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions --conf spark.sql.catalog.demo=org.apache.iceberg.spark.SparkCatalog --conf spark.sql.catalog.demo.type=rest --conf spark.sql.catalog.demo.uri=http://iceberg-catalog:8181 --conf spark.sql.catalog.demo.io-impl=org.apache.iceberg.aws.s3.S3FileIO --conf spark.sql.catalog.demo.warehouse=s3a://warehouse/ --conf spark.sql.catalog.demo.s3.endpoint=http://minio:9000 --conf spark.sql.catalog.demo.s3.path-style-access=true --conf spark.sql.catalog.demo.s3.access-key-id=admin --conf spark.sql.catalog.demo.s3.secret-access-key=supersecretpassword --conf spark.sql.catalog.demo.s3.ssl.enabled=false --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000 --conf spark.hadoop.fs.s3a.access.key=admin --conf spark.hadoop.fs.s3a.secret.key=supersecretpassword --conf spark.hadoop.fs.s3a.path.style.access=true --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    depends_on:
      minio:
        condition: service_healthy
      iceberg-catalog:
        condition: service_healthy
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio_data: