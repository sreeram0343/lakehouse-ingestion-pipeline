version: '3.8'

services:
  # --- METADATA DATABASE ---
  postgres:
    image: postgres:13
    container_name: lakehouse-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflowpassword
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- AIRFLOW INITIALIZATION ---
  airflow-init:
    build:
      context: ../
      dockerfile: docker/Dockerfile.airflow
    image: lakehouse-airflow:2.8.1-custom
    container_name: lakehouse-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflowpassword@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../src:/opt/airflow/src
      - ../config:/opt/airflow/config
      - ../logs:/opt/airflow/logs
      - ../airflow/dags:/opt/airflow/dags
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin
    networks:
      - lakehouse-net

  # --- AIRFLOW WEBSERVER ---
  webserver:
    build:
      context: ../
      dockerfile: docker/Dockerfile.airflow
    image: lakehouse-airflow:2.8.1-custom
    container_name: lakehouse-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflowpassword@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      # Pass S3 and Catalog Endpoint configurations for container networking
      - S3_ENDPOINT_URL=http://minio:9000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=supersecretpassword
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=supersecretpassword
      - TARGET_BUCKET_NAME=landing-zone
      - ICEBERG_CATALOG_URI=http://iceberg-catalog:8181
    ports:
      - "8085:8080"
    volumes:
      - ../src:/opt/airflow/src
      - ../config:/opt/airflow/config
      - ../logs:/opt/airflow/logs
      - ../airflow/dags:/opt/airflow/dags
    networks:
      - lakehouse-net

  # --- AIRFLOW SCHEDULER ---
  scheduler:
    build:
      context: ../
      dockerfile: docker/Dockerfile.airflow
    image: lakehouse-airflow:2.8.1-custom
    container_name: lakehouse-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflowpassword@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      # Pass S3 and Catalog Endpoint configurations for container networking
      - S3_ENDPOINT_URL=http://minio:9000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=supersecretpassword
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=supersecretpassword
      - TARGET_BUCKET_NAME=landing-zone
      - ICEBERG_CATALOG_URI=http://iceberg-catalog:8181
    volumes:
      - ../src:/opt/airflow/src
      - ../config:/opt/airflow/config
      - ../logs:/opt/airflow/logs
      - ../airflow/dags:/opt/airflow/dags
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    external: true

volumes:
  postgres_data:
